name: CI

# main 브랜치에 push 되거나 PR이 열릴 때 실행
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK 11 설정 (Gradle 툴체인과 동일)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # 3. Gradle 설정 + 캐시 (의존성 캐싱으로 빌드 속도 향상)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4. gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 5. 빌드 + 테스트
      - name: Build with Gradle
        run: ./gradlew build

      # 6. 테스트 리포트 업로드 (실패해도 결과 확인용)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test
          if-no-files-found: ignore
